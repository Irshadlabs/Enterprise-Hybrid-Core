! ========================================================================
! Script Name: edge_security_hardened.cfg
! Description: Cisco Infrastructure Hardening, Extended ACLs, and SSH v2
! Target:      Cisco Packet Tracer / GNS3 Simulation Layers
! Author:      Mohammed Irshad (CCNA / Cloud Engineer)
! ========================================================================

! 1. Secure Management Plane (SSH Version 2 Configuration)
ip domain-name enterprise.local
crypto key generate rsa general-keys modulus 2048
!
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
!
line vty 0 4
 transport input ssh
 exec-timeout 5 0
 login local
exit

! 2. Define Extended Access Control List (ACL) for Cloud Ingress Boundary
! Deny unauthorized subnet traffic while permitting active cloud tunnels
ip access-list extended CLOUD-INGRESS-FILTER
 permit tcp 10.10.0.0 0.0.255.255 10.1.1.0 0.0.255.255 eq 443
 permit tcp 10.10.0.0 0.0.255.255 10.1.1.0 0.0.255.255 eq 22
 deny   ip any any log
!
! Apply ACL to the Outside WAN Interface (Inbound Direction)
interface GigabitEthernet0/1
 ip access-group CLOUD-INGRESS-FILTER in
exit
