! ========================================================================
! Script Name: edge_router_bgp.cfg
! Description: Cisco Edge Router Interface, IPsec Crypto, and BGP Peering
! Target:      Cisco 2911 / ISR 4331 (Packet Tracer / GNS3 Compatible)
! Author:      Mohammed Irshad (CCNA / AWS Solutions Architect)
! ========================================================================

! 1. Configure LAN and WAN Interfaces
interface GigabitEthernet0/0
 description Inside LAN Interface (Corporate Subnet)
 ip address 10.1.1.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description Outside WAN Interface (Connected to Internet/AWS Gateway)
 ip address 203.0.113.2 255.255.255.252
 no shutdown

! 2. Configure Border Gateway Protocol (BGP) to AWS Cloud
router bgp 65001
 neighbor 169.254.11.1 remote-as 64512
 neighbor 169.254.11.1 timers 10 30 
 ! 
 address-family ipv4
  network 10.1.1.0 mask 255.255.255.0
  neighbor 169.254.11.1 activate
  neighbor 169.254.11.1 soft-reconfiguration inbound
 exit-address-family
