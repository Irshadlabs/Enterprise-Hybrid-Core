# ========================================================================
# Description: Enterprise Nginx Secure Reverse Proxy Configuration
# Target Stack: Cloud Support Environment & SSL/TLS Infrastructure
# Author:      Mohammed Irshad
# ========================================================================

server {
    listen 80;
    server_name irshad.tech www.irshad.tech;

    # Dynamic HTTP to HTTPS Global Redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name irshad.tech www.irshad.tech;

    # Secure SSL Protocol Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Access and Error Logging Vectors
    access_log /var/log/nginx/app_access.log;
    error_log /var/log/nginx/app_error.log warn;

    location / {
        # Reverse Proxy Routing Headers
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Operational Timeout Parameters
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}
